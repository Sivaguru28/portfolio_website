<script>
  // Setup all dynamic header logic
  (function setupHeader() {
    const currentPage = window.location.pathname.split("/").pop() || "index.html";

    // 1. Dynamic Logo Swapper
    const logoDefault = document.getElementById('logo-default');
    const logoIndex = document.getElementById('logo-index');

    if (currentPage === "index.html" || currentPage === "") {
      if(logoDefault) logoDefault.classList.add('hidden');
      if(logoIndex) {
        logoIndex.classList.remove('hidden');
        logoIndex.classList.add('flex');
      }
    }

    // 2. Highlight Active Page
    const links = document.querySelectorAll(".nav-item");
    links.forEach(link => {
      if (link.getAttribute("href") === currentPage) {
        link.classList.add("text-primary"); 
      }
    });

    // 3. Mobile Menu Toggle Logic
    const mobileBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const mobileIcon = document.getElementById('mobile-menu-icon');

    if(mobileBtn && mobileMenu && mobileIcon) {
      mobileBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
        mobileMenu.classList.toggle('flex');
        if (mobileMenu.classList.contains('hidden')) {
          mobileIcon.innerText = 'menu';
        } else {
          mobileIcon.innerText = 'close';
        }
      });
    }
  })();
</script>
